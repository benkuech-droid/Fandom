<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fandom Trek</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #6366f1;
            --text: #ffffff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        
        .card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #555; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; gap: 5px; }
        .nav-item.active { color: var(--accent); }

        button { background: var(--accent); border: none; color: white; padding: 15px; border-radius: 14px; font-weight: 700; width: 100%; }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div id="quest" class="page active">
        <div class="card">
            <h2>Abenteuer starten</h2>
            <select id="franchise" style="background:#111; color:#fff; border:none; padding:15px; border-radius:12px; width:100%; margin-bottom:15px;">
                <option value="hdr">Der Herr der Ringe</option>
                <option value="starwars">Star Wars</option>
            </select>
            <button onclick="alert('Synchronisiert!')">Fortschritt Sync</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="show('quest', this)"><span>📍</span>QUEST</div>
        <div class="nav-item" onclick="show('stats', this)"><span>📊</span>STATS</div>
        <div class="nav-item" onclick="show('collection', this)"><span>🏆</span>SAMMLUNG</div>
    </div>

    <script>
        function show(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
